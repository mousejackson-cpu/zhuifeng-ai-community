version: "3.9"

services:
  zhuifeng-ai-community:
    build: .
    container_name: zhuifeng-ai-community
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: "false"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./generated:/app/generated
      - ./temp:/app/temp
    restart: unless-stopped
